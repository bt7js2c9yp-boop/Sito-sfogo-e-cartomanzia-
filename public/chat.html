<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Chat Sfogo</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main>
    <h2>Chat Sfogo (1 credito per messaggio)</h2>
    <div>
      <form id="sendForm">
        <input name="message" placeholder="Scrivi il tuo sfogo..." required />
        <button>Invia</button>
      </form>
      <button id="buy">Compra crediti</button>
    </div>
    <ul id="history"></ul>
  </main>
  <script>
    async function loadHistory(){
      const res = await fetch('/api/chat/history');
      const j = await res.json();
      if (j.ok){
        const h = document.getElementById('history');
        h.innerHTML = '';
        j.history.forEach(it => {
          const li = document.createElement('li');
          li.innerText = `${new Date(it.createdAt).toLocaleString()}: ${it.message}`;
          h.appendChild(li);
        });
      }
    }
    document.getElementById('sendForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const msg = e.target.message.value;
      const res = await fetch('/api/chat/send', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({message: msg})});
      const j = await res.json();
      if (j.ok){
        e.target.message.value = '';
        loadHistory();
        alert(j.reply);
      } else {
        alert(j.error || 'Error');
      }
    });
    document.getElementById('buy').addEventListener('click', async ()=>{
      const credits = prompt('Quanti crediti vuoi comprare? (numero)');
      if (!credits) return;
      const res = await fetch('/api/payment/create-session', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({credits})});
      const j = await res.json();
      if (j.url) window.location = j.url;
      else alert(j.error||'Errore');
    });
    loadHistory();
  </script>
</body>
</html>
