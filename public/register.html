<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Register</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main>
    <h2>Register</h2>
    <form id="form">
      <input name="email" placeholder="Email" required />
      <input name="password" type="password" placeholder="Password" required />
      <button type="submit">Register</button>
    </form>
    <p id="msg"></p>
  </main>
  <footer>
    <p><a href="/privacy.html">Privacy Policy</a> | <a href="/terms.html">Termini di servizio</a></p>
  </footer>
  <script>
    document.querySelector('#form').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const form = e.target;
      const res = await fetch('/auth/register', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email: form.email.value, password: form.password.value})});
      const j = await res.json();
      if (j.ok) location.href = '/chat.html';
      else document.getElementById('msg').innerText = j.error || 'Error';
    });
  </script>
  <script src="/cookie-banner.js"></script>
</body>
</html>
