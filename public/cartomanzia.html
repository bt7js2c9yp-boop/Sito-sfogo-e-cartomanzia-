<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cartomanzia</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main>
    <h2>Cartomanzia - Oracolo</h2>
    <button id="ask">Chiedi all'oracolo</button>
    <p id="ans"></p>
  </main>
  <footer>
    <p><a href="/privacy.html">Privacy Policy</a> | <a href="/terms.html">Termini di servizio</a></p>
  </footer>
  <script>
    const phrases = [
      "I tuoi pensieri guideranno il tuo destino.",
      "Un cambiamento positivo è in arrivo.",
      "Ascolta il cuore, ma porta anche ragione.",
      "La pazienza sarà ricompensata.",
      "Attento alle nuove opportunità."
    ];
    document.getElementById('ask').addEventListener('click', ()=>{
      const a = phrases[Math.floor(Math.random()*phrases.length)];
      document.getElementById('ans').innerText = a;
    });
  </script>
  <script src="/cookie-banner.js"></script>
</body>
</html>
